name: Review

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-review-${{ fromJSON(github.event.inputs.event_payload).pull_request.number || fromJSON(github.event.inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6
        with:
          path: .fullsend
          fetch-depth: 1

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          path: target-repo
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: REVIEW_
          REVIEW_TARGET_REPO_DIR: target-repo
          REVIEW_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          REVIEW_CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: bash .fullsend/.github/scripts/setup-agent-env.sh

      - name: Run review agent(s)
        uses: ./.fullsend/.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          GITHUB_PR_URL: ${{ fromJSON(inputs.event_payload).pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
        with:
          agent: review